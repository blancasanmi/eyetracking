<html>
<head>
  <title>Eye-Tracking Reading Experiment</title>
  <script src="https://unpkg.com/jspsych@7.3.4"></script>
  <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@1.1.3"></script>
  <script src="https://unpkg.com/@jspsych/plugin-html-button-response@1.1.3"></script>
  <script src="https://unpkg.com/@jspsych/plugin-call-function@1.1.3"></script>
  <link href="https://unpkg.com/jspsych@7.3.4/css/jspsych.css" rel="stylesheet"/>
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css">
  <link rel="stylesheet" href="style.css" type="text/css">
  <script src="sentences.js"></script>

  <style>
  html, body {
    height: 100vh;
    overflow: hidden;
    margin: 0;
    padding: 0;
  }

  #jspsych-content, .jspsych-display-element {
    height: 100vh;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .jspsych-html-button-response-stimulus {
    max-height: none;
    display: block;
  }

  .jspsych-html-button-response-btngroup {
    margin-top: 20px;
  }

  .sentence-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: auto;
    width: 100%;
    padding: 40px;
    box-sizing: border-box;
    max-width: 90vw;
    gap: 40px;
  }

  .sentence-text {
    font-family: 'Courier New', monospace;
    font-size: 40px;
    line-height: 2.2;
    letter-spacing: 2px;
    text-align: center;
    color: #111;
    max-width: 90vw;
    width: 100%;
  }

  .sentence-divider {
    width: 60%;
    border: none;
    margin: 0;
  }

  #jspsych-html-button-response-stimulus {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
  }

  .jspsych-html-button-response-btngroup {
    display: flex;
    flex-direction: row;
    justify-content: center;
    margin-top: 30px;
    width: 100%;
  }

  .jspsych-content {
    max-width: 100% !important;
    width: 100% !important;
  }

  .jspsych-html-button-response-button button {
    font-family: 'Courier New', monospace;
    font-size: 22px;
    padding: 20px 60px;
    border-radius: 6px;
    margin: 0 15px;
    cursor: pointer;
  }

  #gaze-dot {
    position: fixed;
    width: 20px;
    height: 20px;
    background: rgba(255, 0, 0, 0.5);
    border-radius: 50%;
    pointer-events: none;
    transform: translate(-50%, -50%);
    z-index: 99999;
    display: none;
  }

  .calib-dot {
    position: fixed;
    width: 30px;
    height: 30px;
    background: red;
    border-radius: 50%;
    transform: translate(-50%, -50%);
    z-index: 10000;
  }

  .instructions {
    font-size: 24px;
    max-width: 800px;
    line-height: 1.6;
  }

  #container-consent {
    padding: 40px;
    max-width: 900px;
    margin: auto;
    overflow-y: auto;
    max-height: 100vh;
  }
  </style>
</head>
<body>
  <div id="gaze-dot"></div>

  <script>
  // ═══════════════════════════════════════════════════════════════
  //  CONFIGURATION
  // ═══════════════════════════════════════════════════════════════

  const WS_URL = "ws://localhost:8765";
  const SHOW_GAZE_DOT = false;

  // ═══════════════════════════════════════════════════════════════
  //  SENTENCES + CATCH TRIALS
  // ═══════════════════════════════════════════════════════════════

  let SENTENCES_FIRST  = [];
  let SENTENCES_SECOND = [];

  // ═══════════════════════════════════════════════════════════════
  //  WEBSOCKET + GAZE HANDLING
  // ═══════════════════════════════════════════════════════════════

  let ws = null;
  let gazeLog = [];
  let catchTrialResults = [];
  let calibrationLog = [];
  let connected = false;
  let showGazeDot = true;
  let catchTrials = {};
  let catchTrialsReceived = false;
  let onCatchTrialsReceived = null;

  function ensureGazeDot() {
    let dot = document.getElementById("gaze-dot");
    if (!dot) {
      dot = document.createElement("div");
      dot.id = "gaze-dot";
      dot.style.cssText = "position:fixed;width:20px;height:20px;background:rgba(255,0,0,0.5);border-radius:50%;pointer-events:none;transform:translate(-50%,-50%);z-index:99999;";
      document.body.appendChild(dot);
    }
    return dot;
  }

  // ── Experimenter alert overlay ─────────────────────────────────
  // Extracted as a named function so it can be reused in both
  // the main onmessage handler and the temporary calibration handler.

  function showExperimenterAlert() {
    // Remove any existing overlay first
    const existing = document.getElementById("experimenter-alert");
    if (existing) existing.remove();

    const overlay = document.createElement("div");
    overlay.id = "experimenter-alert";
    overlay.style.cssText = `
      position: fixed; inset: 0; background: red;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 9999;
    `;
    overlay.innerHTML = `
      <p style="color:white; font-size:2.5rem; font-weight:bold; text-align:center;">
        La calibration échoue trop souvent.<br>Appelez l'expérimentateur.
      </p>
      <button id="resume-calib-btn" style="margin-top:2rem; font-size:1.5rem; padding:1rem 2rem;">
        Relancer la calibration
      </button>
    `;
    document.body.appendChild(overlay);

    document.getElementById("resume-calib-btn").addEventListener("click", () => {
      overlay.remove();
      ws.send(JSON.stringify({ cmd: "calibration_resume" }));
    });
  }

  // ── Main WebSocket message handler ────────────────────────────

  function handleMessage(event) {
    const msg = JSON.parse(event.data);

    if (msg.type === "init") {
      SENTENCES_FIRST  = msg.sentences_first;
      SENTENCES_SECOND = msg.sentences_second;
      catchTrials = msg.catch_trials;
      catchTrialsReceived = true;
      console.log("Init received:", SENTENCES_FIRST.length, "pairs,", Object.keys(catchTrials).length, "catch trials");
      if (onCatchTrialsReceived) onCatchTrialsReceived();
    }

    if (msg.type === "gaze" && msg.data) {
      const d = msg.data;
      const sample = {
        fpogx:   parseFloat(d.FPOGX),
        fpogy:   parseFloat(d.FPOGY),
        fpogd:   parseFloat(d.FPOGD || 0),
        fpogv:   parseInt(d.FPOGV || 0),
        fpogid:  parseInt(d.FPOGID || 0),
        bpogx:   parseFloat(d.BPOGX || d.FPOGX),
        bpogy:   parseFloat(d.BPOGY || d.FPOGY),
        bpogv:   parseInt(d.BPOGV || 0),
        time:    parseFloat(d.TIME || 0),
        user_data: d.USER_DATA || "",
        local_ts: performance.now()
      };
      gazeLog.push(sample);

      if (SHOW_GAZE_DOT && showGazeDot) {
        const dot = ensureGazeDot();
        if (sample.fpogv) {
          dot.style.display = "block";
          dot.style.left = (sample.fpogx * window.innerWidth) + "px";
          dot.style.top  = (sample.fpogy * window.innerHeight) + "px";
        } else {
          dot.style.display = "none";
        }
      }
    }

    if (msg.type === "experimenter_alert") {
      showExperimenterAlert();
    }
  }

  function connectGazePoint() {
    return new Promise((resolve, reject) => {
      ws = new WebSocket(WS_URL);

      ws.onopen = () => {
        connected = true;
        console.log("[GP] WebSocket connected");
        resolve();
      };

      ws.onerror = (e) => {
        console.error("[GP] WebSocket error", e);
        reject(e);
      };

      ws.onclose = () => {
        connected = false;
        console.log("[GP] WebSocket closed");
      };

      ws.onmessage = handleMessage;
    });
  }

  function sendTrigger(label) {
    if (ws && connected) {
      ws.send(JSON.stringify({ cmd: "trigger", value: label }));
      console.log("[TRIGGER]", label);
    }
  }

  function startCalibration() {
    if (ws && connected) {
      ws.send(JSON.stringify({ cmd: "calibrate" }));
    }
  }

  function stopExperiment() {
    if (ws && connected) {
      ws.send(JSON.stringify({ cmd: "stop" }));
      ws.close();
    }
  }

  // ── Calibration jsPsych node ───────────────────────────────────
  // The temporary onmessage handler also calls showExperimenterAlert()
  // so the alert works even during the calibration wait.

  function makeCalibrationCallFunction(label, done_trigger) {
    return {
      type: jsPsychCallFunction,
      async: true,
      func: function(done) {
        const originalOnMessage = ws.onmessage;

        ws.onmessage = (event) => {
          const msg = JSON.parse(event.data);

          if (msg.type === "calibration_done" || msg.type === "calibration_result") {
            console.log(`[CALIB] Done (${label})`);
            // Store calibration data
            if (msg.type === "calibration_done") {
              calibrationLog.push({
                label: label,
                avg_error: msg.avg_error,
                valid_points: msg.valid_points,
                attempts: msg.attempts,
                timestamp: new Date().toISOString()
              });
            }
            ws.onmessage = originalOnMessage;
            done();
          } else if (msg.type === "experimenter_alert") {
            showExperimenterAlert();
          } else {
            if (typeof originalOnMessage === "function") originalOnMessage(event);
          }
        };

        console.log(`[CALIB] Launching calibration (${label})...`);
        startCalibration();
        if (done_trigger) sendTrigger(done_trigger);
      }
    };
  }

  function makeRecalibrationNode(sentidx) {
    return [
      {
        type: jsPsychHtmlKeyboardResponse,
        stimulus: `
          <div class="instructions">
            <h2>Pause — Recalibration</h2>
            <p>Vous pouvez retirer votre tête de la mentonnière pendant la pause..</p>
            <p>Quand vous serez prêt(e), remettez vous en place et on relancera la calibration.</p>
            <p>Appuyez sur <strong>ESPACE</strong> pour lancer la recalibration et continuer l'expérience.</p>
          </div>
        `,
        choices: [" "],
        on_start: () => sendTrigger(`recalibration_prompt_${sentidx}`)
      },
      makeCalibrationCallFunction(`recalib_${sentidx}`, `recalibration_start_${sentidx}`),
      {
        type: jsPsychHtmlKeyboardResponse,
        stimulus: `
          <div class="instructions">
            <h2>Recalibration terminée</h2>
            <p>Appuyez sur <strong>ESPACE</strong> pour continuer la lecture.</p>
          </div>
        `,
        choices: [" "]
      }
    ];
  }

  // ═══════════════════════════════════════════════════════════════
  //  jsPsych EXPERIMENT
  // ═══════════════════════════════════════════════════════════════

  const jsPsych = initJsPsych({
    on_finish: function () {
      const allData = jsPsych.data.get();
      if (typeof jatos !== "undefined") {
        jatos.submitResultData(JSON.stringify({
          jspsych: allData.json(),
          gaze: gazeLog
        }), jatos.startNextComponent);
      }
    }
  });

  const timeline = [];
  const MIN_SENTENCE_ADVANCE_DELAY_MS = 2000;
  let sentenceAdvanceKeyHandler = null;

  // ── 1. Connect to relay ────────────────────────────────────────

  timeline.push({
    type: jsPsychHtmlKeyboardResponse,
    stimulus: `
      <div class="instructions">
        <h2>Expérience de lecture avec suivi eye-tracker</h2>
        <p>Cette expérience enregistre les mouvements de vos yeux pendant que vous lisez des phrases.</p>
        <p><strong>Avant de commencer :</strong> Asseyez-vous confortablement à environ 60 cm de l'écran en posant la tête sur la mentonnière.</p>
        <p>Cliquez sur la touche <strong>ESPACE</strong> pour continuer.</p>
      </div>
    `,
    choices: [" "]
  });

  timeline.push({
    type: jsPsychCallFunction,
    async: true,
    func: async function (done) {
      try {
        await connectGazePoint();
        done({ success: true });
      } catch (e) {
        done({ success: false, error: e.message });
      }
    }
  });

  // ── 2. Calibration ────────────────────────────────────────────

  timeline.push({
    type: jsPsychHtmlKeyboardResponse,
    stimulus: `
      <div class="instructions">
        <h2>Calibration</h2>
        <p>Un écran de calibration apparaîtra dans la fenêtre.</p>
        <p>Suivez le point en mouvement avec vos yeux (sans bouger la tête) et sans prédire où il va.</p>
        <p>Puis un écran apparaîtra, dans lequel vous pouvez vérifier si le point vert suit votre regard sur l'écran.</p>
        <p>Si la calibration échoue, une deuxième tentative sera effectuée.</p>
        <p>Appelez l'administrateur si vous recontrez des problèmes.</p>
        <p>Appuyez sur la touche <strong>ESPACE</strong> pour lancer la calibration et attendez 2 secondes.</p>
      </div>
    `,
    choices: [" "]
  });

  timeline.push(makeCalibrationCallFunction("initial", "calibration_start"));

  // ── 3. Gaze check ─────────────────────────────────────────────

  timeline.push({
    type: jsPsychHtmlKeyboardResponse,
    stimulus: `
      <div class="instructions">
        <h2>L'expérience va commencer</h2>
        <p>Identifiez les flèches sur le clavier (↑ ↓) et la touche <strong>ESPACE</strong>. Vous les utiliserez pour naviguer dans l'expérience.</p>
        <p>Lorsque vous avez terminé de lire, appuyez sur la touche <strong>ESPACE</strong> pour passer à la phrase suivante.</p>
        <p>Vous serez invité(e) à répondre à des questions tout au long de l'expérience avec les flèches du clavier (↑ ↓).</p>
        <p>Entre les phrases, un point de fixation, qui s'affiche comme une croix (+), apparaîtra au centre de l'écran pendant 2 secondes. Veuillez le regarder jusqu'à ce que la phrase suivante s'affiche.</p>
        <p>Il y aura 4 pauses au cours de l'expérience. Vous pourrez vous détendre un instant avant de poursuivre avec une nouvelle calibration.</p>
        <p>Appuyez sur la touche <strong>ESPACE</strong> lorsque vous êtes prêt(e) à commencer.</p>
      </div>
    `,
    choices: [" "],
    on_start: () => {
      showGazeDot = true;
    }
  });

  // Wait for catch_trials from server (5 s timeout)
  timeline.push({
    type: jsPsychCallFunction,
    async: true,
    func: function(done) {
      if (catchTrialsReceived) {
        done();
      } else {
        const timeout = setTimeout(() => {
          onCatchTrialsReceived = null;
          done();
        }, 5000);
        onCatchTrialsReceived = () => {
          clearTimeout(timeout);
          done();
        };
      }
    }
  });

  // ── 4. Sentence reading trials ────────────────────────────────

  function makeSentenceTrials(sentenceFirst, sentenceSecond, presentationIdx) {
    const trialId = `pres${presentationIdx}`;
    return [
      {
        type: jsPsychHtmlKeyboardResponse,
        stimulus: '<div style="font-size:80px;text-align:center;">+</div>',
        choices: "NO_KEYS",
        trial_duration: 2000,
        on_start: () => sendTrigger(`fixation_onset_${trialId}`)
      },
      {
        type: jsPsychHtmlKeyboardResponse,
        stimulus: `
          <div class="sentence-container">
            <div class="sentence-text">${sentenceFirst}</div>
            <hr class="sentence-divider">
            <div class="sentence-text">${sentenceSecond}</div>
          </div>
        `,
        choices: [" "],
        data: {
          task: "reading",
          sentence_first: sentenceFirst,
          sentence_second: sentenceSecond,
          presentation_index: presentationIdx
        },
        on_start: () => sendTrigger(`sentence_onset_${trialId}`),
        on_load: () => {
          if (sentenceAdvanceKeyHandler) {
            document.removeEventListener("keydown", sentenceAdvanceKeyHandler, true);
          }

          const startTime = performance.now();
          sentenceAdvanceKeyHandler = (event) => {
            const isSpace = event.code === "Space" || event.key === " " || event.key === "Spacebar";
            if (!isSpace) return;

            const elapsed = performance.now() - startTime;
            if (elapsed < MIN_SENTENCE_ADVANCE_DELAY_MS) {
              event.preventDefault();
              event.stopPropagation();
            }
          };

          document.addEventListener("keydown", sentenceAdvanceKeyHandler, true);
        },
        on_finish: (data) => {
          if (sentenceAdvanceKeyHandler) {
            document.removeEventListener("keydown", sentenceAdvanceKeyHandler, true);
            sentenceAdvanceKeyHandler = null;
          }
          sendTrigger(`sentence_offset_${trialId}`);
          data.rt_ms = data.rt;
        }
      }
    ];
  }

  function makeCatchTrialNode(sentence, sentidx, catchidx, type, sentenceFirst, sentenceSecond) {
    const question = `Avez-vous vu la phrase suivante ?<br><br><em>${sentence}</em>`;
    return {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: `
        <div style="
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          width: 90vw;
          max-width: 90vw;
          box-sizing: border-box;
          padding: 40px;
          word-wrap: break-word;
          overflow-wrap: break-word;
          white-space: normal;
        ">
          <div style="
            font-family: 'Courier New', monospace;
            font-size: 40px;
            line-height: 2.2;
            letter-spacing: 2px;
            text-align: center;
            color: #111;
            width: 100%;
            word-wrap: break-word;
            overflow-wrap: break-word;
            white-space: normal;
          ">${question}</div>

          <div style="
            display: flex;
            flex-direction: row;
            gap: 80px;
            margin-top: 60px;
            font-family: 'Courier New', monospace;
            font-size: 28px;
            color: #333;
          ">
            <div style="text-align:center;">
              <div style="font-size: 48px;">↑</div>
              <div>Oui</div>
            </div>
            <div style="text-align:center;">
              <div style="font-size: 48px;">↓</div>
              <div>Non</div>
            </div>
          </div>
        </div>
      `,
      choices: ["arrowup", "arrowdown"],
      data: { task: "catch", sentence, catch_index: catchidx, sentence_position: sentidx, catch_type: type, sentence_first: sentenceFirst, sentence_second: sentenceSecond },
      on_start: () => sendTrigger(`catch_onset_${catchidx}`),
      on_finish: (data) => {
        sendTrigger(`catch_offset_${catchidx}`);
        data.response_label   = data.response === "arrowup" ? "Oui" : "Non";
        data.correct_response = type === "seen" ? "Oui" : "Non";
        data.correct          = (data.response === "arrowup") === (type === "seen");

        catchTrialResults.push({
          catch_index:       catchidx,
          sentence_position: sentidx,
          sentence,
          sentence_first:    sentenceFirst,
          sentence_second:   sentenceSecond,
          catch_type:        type,
          response:          data.response,
          response_label:    data.response_label,
          correct_response:  data.correct_response,
          correct:           data.correct,
          rt:                data.rt
        });
      }
    };
  }

  // ── 5. Build trials using the randomized order ────────────────

  timeline.push({
    type: jsPsychCallFunction,
    func: function() {
      const subTimeline = [];
      let catchIdx = 0;

      for (let i = 0; i < SENTENCES_FIRST.length; i++) {

        if (i > 0 && i % 20 === 0) {
          subTimeline.push(...makeRecalibrationNode(i));
        }

        if (catchTrials[String(i)]) {
          const ct = catchTrials[String(i)];
          const prevFirst  = i > 0 ? SENTENCES_FIRST[i - 1]  : "";
          const prevSecond = i > 0 ? SENTENCES_SECOND[i - 1] : "";
          subTimeline.push(makeCatchTrialNode(ct.sentence, i, catchIdx++, ct.type, prevFirst, prevSecond));
        }

        subTimeline.push(...makeSentenceTrials(
          SENTENCES_FIRST[i],
          SENTENCES_SECOND[i],
          i
        ));
      }

      subTimeline.push({
        type: jsPsychHtmlKeyboardResponse,
        stimulus: `
          <div class="instructions">
            <h2>L'expérience est terminée!</h2>
            <p>Appuyez une dernière fois sur la barre d'espace pour sauvegarder les données et appelez l'expérimentateur.</p>
            <p>Merci pour votre participation!</p>
          </div>
        `,
        choices: [" "],
        on_start: () => {
          sendTrigger("experiment_end");
          showGazeDot = false;
          const dot = document.getElementById("gaze-dot");
          if (dot) dot.style.display = "none";
        },
        on_finish: () => {
          setTimeout(() => {
            const allData = jsPsych.data.get();

            function buildCSV(rows) {
              if (rows.length === 0) return "";
              const keys = Object.keys(rows[0]);
              const escape = v => {
                const s = (v === null || v === undefined) ? "" : String(v);
                return s.includes(",") || s.includes('"') || s.includes("\n")
                  ? `"${s.replace(/"/g, '""')}"` : s;
              };
              return [keys.join(","), ...rows.map(r => keys.map(k => escape(r[k])).join(","))].join("\n");
            }

            try {
              ws.send(JSON.stringify({ cmd: "save_data", data_type: "experiment_csv", content: allData.csv() }));
              ws.send(JSON.stringify({ cmd: "save_data", data_type: "catch_trials_csv", content: buildCSV(catchTrialResults) }));
              ws.send(JSON.stringify({ cmd: "save_data", data_type: "calibration_json", content: JSON.stringify(calibrationLog, null, 2) }));
              ws.send(JSON.stringify({ cmd: "save_data", data_type: "gaze_json", content: JSON.stringify(gazeLog, null, 2) }));
            } catch (e) {
              console.error("Failed sending data:", e);
            }

            setTimeout(() => stopExperiment(), 3000);
          }, 0);
        }
      });

      jsPsych.addNodeToEndOfTimeline({ timeline: subTimeline });
    }
  });

  // ── Run ────────────────────────────────────────────────────────
  jsPsych.run(timeline);

  </script>
</body>
</html>
