<!DOCTYPE html>
<html>
<head>
  <title>Eye-Tracking Reading Experiment</title>
  <script src="https://unpkg.com/jspsych@7.3.4"></script>
  <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@1.1.3"></script>
  <script src="https://unpkg.com/@jspsych/plugin-html-button-response@1.1.3"></script>
  <script src="https://unpkg.com/@jspsych/plugin-call-function@1.1.3"></script>
  <link href="https://unpkg.com/jspsych@7.3.4/css/jspsych.css" rel="stylesheet"/>
  <style>
    .sentence-container {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      width: 100vw;
      padding: 40px;
      box-sizing: border-box;
    }
    .sentence-text {
      font-family: 'Courier New', monospace;
      font-size: 64px;
      line-height: 1.6;
      letter-spacing: 4px;
      text-align: center;
      color: #111;
      max-width: 90vw;
    }
    #gaze-dot {
      position: fixed;
      width: 20px;
      height: 20px;
      background: rgba(255, 0, 0, 0.5);
      border-radius: 50%;
      pointer-events: none;
      transform: translate(-50%, -50%);
      z-index: 99999;
      display: none;
    }
    .calib-dot {
      position: fixed;
      width: 30px;
      height: 30px;
      background: red;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      z-index: 10000;
    }
    .instructions {
      font-size: 24px;
      max-width: 800px;
      line-height: 1.6;
    }

    /* Calibration quality badge */
    .quality-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 12px;
      font-weight: bold;
      font-size: 18px;
    }
    .quality-excellent { background: #d4edda; color: #155724; }
    .quality-good      { background: #cce5ff; color: #004085; }
    .quality-acceptable{ background: #fff3cd; color: #856404; }
    .quality-poor      { background: #f8d7da; color: #721c24; }
    .quality-unknown   { background: #e2e3e5; color: #383d41; }
  </style>
</head>
<body>
  <div id="gaze-dot"></div>

  <script>
  // ═══════════════════════════════════════════════════════════════
  //  CONFIGURATION
  // ═══════════════════════════════════════════════════════════════

  const WS_URL = "ws://localhost:8765";

  const SENTENCES = [
    "The curious cat slowly climbed the ancient oak tree in the garden",
    "Every morning she walked to the bakery and bought fresh bread",
    "Scientists discovered a new species of butterfly in the Amazon forest"
  ];

  const SHOW_GAZE_DOT = true;

  // Calibration thresholds
  const CALIB_QUALITY_THRESHOLD = "acceptable"; // warn if below this
  const QUALITY_RANK = { excellent: 4, good: 3, acceptable: 2, poor: 1, unknown: 0 };

  // ═══════════════════════════════════════════════════════════════
  //  STATE
  // ═══════════════════════════════════════════════════════════════

  let ws = null;
  let gazeLog = [];
  let connected = false;
  let showGazeDot = true;
  let lastCalibResult = null;  // stores result from most recent calibration

  // ═══════════════════════════════════════════════════════════════
  //  WEBSOCKET + GAZE HANDLING
  // ═══════════════════════════════════════════════════════════════

  function ensureGazeDot() {
    let dot = document.getElementById("gaze-dot");
    if (!dot) {
      dot = document.createElement("div");
      dot.id = "gaze-dot";
      dot.style.cssText = "position:fixed;width:20px;height:20px;background:rgba(255,0,0,0.5);border-radius:50%;pointer-events:none;transform:translate(-50%,-50%);z-index:99999;";
      document.body.appendChild(dot);
    }
    return dot;
  }

  function connectGazePoint() {
    return new Promise((resolve, reject) => {
      ws = new WebSocket(WS_URL);

      ws.onopen = () => {
        connected = true;
        console.log("[GP] WebSocket connected");
        resolve();
      };

      ws.onerror = (e) => {
        console.error("[GP] WebSocket error", e);
        reject(e);
      };

      ws.onclose = () => {
        connected = false;
        console.log("[GP] WebSocket closed");
      };

      ws.onmessage = handleMessage;
    });
  }

  function handleMessage(event) {
    const msg = JSON.parse(event.data);

    if (msg.type === "gaze" && msg.data) {
      const d = msg.data;
      const sample = {
        fpogx: parseFloat(d.FPOGX),
        fpogy: parseFloat(d.FPOGY),
        fpogd: parseFloat(d.FPOGD || 0),
        fpogv: parseInt(d.FPOGV || 0),
        fpogid: parseInt(d.FPOGID || 0),
        bpogx: parseFloat(d.BPOGX || d.FPOGX),
        bpogy: parseFloat(d.BPOGY || d.FPOGY),
        bpogv: parseInt(d.BPOGV || 0),
        time: parseFloat(d.TIME || 0),
        user_data: d.USER_DATA || "",
        local_ts: performance.now()
      };
      gazeLog.push(sample);

      if (SHOW_GAZE_DOT && showGazeDot) {
        const dot = ensureGazeDot();
        if (sample.fpogv) {
          dot.style.display = "block";
          dot.style.left = (sample.fpogx * window.innerWidth) + "px";
          dot.style.top  = (sample.fpogy * window.innerHeight) + "px";
        } else {
          dot.style.display = "none";
        }
      }
    }

    // Calibration result coming back from relay
    if (msg.type === "calibration_result") {
      console.log("[CALIB] Result received:", msg);
      lastCalibResult = msg;
      // Dispatch a custom event so the waiting trial can react
      window.dispatchEvent(new CustomEvent("calibration_done", { detail: msg }));
    }
  }

  function sendTrigger(label) {
    if (ws && connected) {
      ws.send(JSON.stringify({ cmd: "trigger", value: label }));
      console.log("[TRIGGER]", label);
    }
  }

  function startCalibration() {
    lastCalibResult = null;
    if (ws && connected) {
      ws.send(JSON.stringify({ cmd: "calibrate" }));
      console.log("[CALIB] Calibration command sent");
    }
  }

  function qualityBadge(quality) {
    const label = quality || "unknown";
    return `<span class="quality-badge quality-${label}">${label}</span>`;
  }

  function isBelowThreshold(quality) {
    return (QUALITY_RANK[quality] || 0) < (QUALITY_RANK[CALIB_QUALITY_THRESHOLD] || 0);
  }

  // ═══════════════════════════════════════════════════════════════
  //  jsPsych EXPERIMENT
  // ═══════════════════════════════════════════════════════════════

  const jsPsych = initJsPsych({
    on_finish: function () {
      const results = {
        jspsych: jsPsych.data.get().json(),
        gaze: gazeLog,
        calibration: lastCalibResult
      };

      if (typeof jatos !== "undefined") {
        jatos.submitResultData(JSON.stringify(results), jatos.startNextComponent);
      } else {
        console.log("Results:", results);
        document.body.innerHTML = "<pre style='padding:20px;font-size:14px;'>" +
          JSON.stringify(results, null, 2).slice(0, 5000) + "\n...</pre>";
      }
    }
  });

  const timeline = [];

  // ── 1. Connect ─────────────────────────────────────────────────

  timeline.push({
    type: jsPsychHtmlButtonResponse,
    stimulus: `
      <div class="instructions">
        <h2>Eye-Tracking Reading Experiment</h2>
        <p>This experiment tracks your eye movements while you read sentences.</p>
        <p><strong>Before starting:</strong></p>
        <ol>
          <li>Make sure <em>Gazepoint Control</em> is running</li>
          <li>Make sure <em>gp_relay.py</em> is running</li>
          <li>Sit comfortably <strong>60–65 cm</strong> from the screen</li>
          <li>Keep your head still during calibration — move only your eyes</li>
        </ol>
        <p>Click below to connect to the eye tracker.</p>
      </div>
    `,
    choices: ["Connect to Eye Tracker"]
  });

  timeline.push({
    type: jsPsychCallFunction,
    async: true,
    func: async function (done) {
      try {
        await connectGazePoint();
        done({ success: true });
      } catch (e) {
        done({ success: false, error: e.message });
      }
    }
  });

  // ── 2. Calibration loop ────────────────────────────────────────
  //
  //  We use a loop so the participant can recalibrate as many times
  //  as needed until quality is acceptable.

  function buildCalibrationTrials() {

    // 2a. Instruction screen — starts calibration on button click
    const calibInstruction = {
      type: jsPsychHtmlButtonResponse,
      stimulus: `
        <div class="instructions">
          <h2>Calibration</h2>
          <p>A <strong>9-point</strong> calibration screen will appear in the
             <em>Gazepoint Control</em> window.</p>
          <ul>
            <li>Follow the moving dot with your <strong>eyes only</strong> — not your head</li>
            <li>Keep your head still and maintain ~60 cm distance</li>
            <li>Blink normally</li>
          </ul>
          <p>The calibration result will appear automatically when done.</p>
        </div>
      `,
      choices: ["Start Calibration"],
      on_finish: () => { startCalibration(); }
    };

    // 2b. Wait for calibration_done event (replaces manual SPACE press)
    const calibWait = {
      type: jsPsychCallFunction,
      async: true,
      func: function(done) {
        // If result already arrived (fast calibration), proceed immediately
        if (lastCalibResult) { done(); return; }

        function onDone() {
          window.removeEventListener("calibration_done", onDone);
          done();
        }
        window.addEventListener("calibration_done", onDone);
      }
    };

    // 2c. Show result and offer recalibration if quality is poor
    const calibResult = {
      type: jsPsychHtmlButtonResponse,
      stimulus: function() {
        const r = lastCalibResult || {};
        const quality = r.quality || "unknown";
        const err = (r.avg_error >= 0) ? r.avg_error.toFixed(3) + "°" : "n/a";
        const warn = isBelowThreshold(quality)
          ? `<p style="color:#856404;background:#fff3cd;padding:10px;border-radius:6px;">
               ⚠️ Calibration quality is below threshold. Recalibration recommended.
             </p>`
          : `<p style="color:#155724;">✓ Calibration looks good. You can proceed.</p>`;

        return `
          <div class="instructions">
            <h2>Calibration Result</h2>
            <p>Quality: ${qualityBadge(quality)} &nbsp; Average error: <strong>${err}</strong></p>
            ${warn}
            <p>Check the red dot — look around the screen to verify accuracy.</p>
            <p>Would you like to proceed or recalibrate?</p>
          </div>
        `;
      },
      choices: ["Proceed", "Recalibrate"],
      on_start: () => { showGazeDot = true; },
      data: { task: "calibration_decision" }
    };

    // 2d. Conditional: loop back if "Recalibrate" was chosen (response index 1)
    const calibConditional = {
      timeline: [calibInstruction, calibWait, calibResult],
      loop_function: function(data) {
        const last = data.filter({ task: "calibration_decision" }).last(1).values()[0];
        return last && last.response === 1; // 1 = "Recalibrate"
      }
    };

    return calibConditional;
  }

  timeline.push(buildCalibrationTrials());

  // ── 3. Gaze check ─────────────────────────────────────────────

  timeline.push({
    type: jsPsychHtmlKeyboardResponse,
    stimulus: `
      <div class="instructions">
        <h2>Gaze Check</h2>
        <p>You should see a <span style="color:red;">red dot</span> following your gaze.</p>
        <p>Look at each corner of the screen to verify accuracy.</p>
        <p>Press <strong>SPACE</strong> when ready to begin.</p>
      </div>
    `,
    choices: [" "],
    on_start: () => { showGazeDot = true; }
  });

  // ── 4. Sentence reading trials ────────────────────────────────

  function makeSentenceTrial(sentence, index) {
    const trialId = `sentence_${index}`;

    timeline.push({
      type: jsPsychHtmlKeyboardResponse,
      stimulus: '<div style="font-size:80px;text-align:center;">+</div>',
      choices: "NO_KEYS",
      trial_duration: 1000,
      on_start: () => sendTrigger(`fixation_onset_${trialId}`)
    });

    timeline.push({
      type: jsPsychHtmlKeyboardResponse,
      stimulus: `
        <div class="sentence-container">
          <div class="sentence-text">${sentence}</div>
        </div>
      `,
      choices: [" "],
      data: { task: "reading", sentence: sentence, trial_index: index },
      on_start: () => sendTrigger(`sentence_onset_${trialId}`),
      on_finish: (data) => {
        sendTrigger(`sentence_offset_${trialId}`);
        data.rt_ms = data.rt;
      }
    });
  }

  SENTENCES.forEach((s, i) => makeSentenceTrial(s, i));

  // ── 5. End ────────────────────────────────────────────────────

  timeline.push({
    type: jsPsychHtmlButtonResponse,
    stimulus: `
      <div class="instructions">
        <h2>Done!</h2>
        <p>Thank you. Your data is being saved.</p>
      </div>
    `,
    choices: ["Finish"],
    on_start: () => {
      sendTrigger("experiment_end");
      showGazeDot = false;
      const dot = document.getElementById("gaze-dot");
      if (dot) dot.style.display = "none";
    }
  });

  // ── Run ────────────────────────────────────────────────────────
  jsPsych.run(timeline);

  </script>
</body>
</html>
