  <style>
  html, body {
    height: 100vh;

  }

  #jspsych-content, .jspsych-display-element {

    align-items: center;

  }

    /* remove the old max-height/flex rules */
    max-height: none;
    display: block;
  }

  .jspsych-html-button-response-btngroup {
    margin-top: 20px;  /* tight gap between sentence and buttons */
  }

  .sentence-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    /* remove height: 50vh — let content size itself */
    height: auto;
    width: 100%;
    padding: 40px;
    box-sizing: border-box;
    max-width: 90vw;
    gap: 40px;
  }

  .sentence-text {
    font-family: 'Courier New', monospace;
    font-size: 40px;  /* responsive, never overflows */
    line-height: 2.2;
    letter-spacing: 2px;
    text-align: center;
    color: #111;
    max-width: 90vw;   /* long sentences wrap instead of overflowing */
    width: 100%;
  }

  .sentence-divider {
    width: 60%;
    border: none;
    /* border-top: 2px solid #ccc; */
    margin: 0;
  }

  /* ── Catch trial layout fixes ─────────────────────────────────── */
    #jspsych-html-button-response-stimulus {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
  }

  .jspsych-html-button-response-btngroup {
    display: flex;
    flex-direction: row;
    justify-content: center;
    margin-top: 30px;
    width: 100%;
  }

  /* Override jsPsych's default button trial container */
  .jspsych-content {
    max-width: 100% !important;
    width: 100% !important;
  }
  
  .jspsych-html-button-response-button button {
    font-family: 'Courier New', monospace;
    font-size: 22px;
    padding: 20px 60px;
    border-radius: 6px;
    margin: 0 15px;
    cursor: pointer;
  }

  /* ── Gaze cursor overlay ──────────────────────────────────── */
  #gaze-dot {
    position: fixed;
    width: 20px;
    height: 20px;
    background: rgba(255, 0, 0, 0.5);
    border-radius: 50%;
    pointer-events: none;
    transform: translate(-50%, -50%);
    z-index: 99999;
    display: none;
  }

  .calib-dot {
    position: fixed;
    width: 30px;
    height: 30px;
    background: red;
    border-radius: 50%;
    transform: translate(-50%, -50%);
    z-index: 10000;
  }

  .instructions {
    font-size: 24px;
    max-width: 800px;
    line-height: 1.6;
  }

  /* ── Consent form ─────────────────────────────────────────── */
  #container-consent {
    padding: 40px;
    max-width: 900px;
    margin: auto;
    overflow-y: auto;
    max-height: 100vh;

  <script>
  // ═══════════════════════════════════════════════════════════════
  //  CONFIGURATION
  // ═══════════════════════════════════════════════════════════════

  const WS_URL = "ws://localhost:8765";

  const SHOW_GAZE_DOT = false;

  // ═══════════════════════════════════════════════════════════════
  //  SENTENCES + CATCH TRIALS
  //  Populated from the Python relay's "init" message, which owns
  //  the shuffle so both sides stay in sync.
  // ═══════════════════════════════════════════════════════════════

  let SENTENCES_FIRST  = [];
  let SENTENCES_SECOND = [];

  // ═══════════════════════════════════════════════════════════════
  //  WEBSOCKET + GAZE HANDLING
  // ═══════════════════════════════════════════════════════════════

  let ws = null;
  let gazeLog = [];
  let connected = false;
  let showGazeDot = true;
  let catchTrials = {};
  let catchTrialsReceived = false;
  let onCatchTrialsReceived = null;

  function ensureGazeDot() {
    let dot = document.getElementById("gaze-dot");
    if (!dot) {
      dot = document.createElement("div");
      dot.id = "gaze-dot";
      dot.style.cssText = "position:fixed;width:20px;height:20px;background:rgba(255,0,0,0.5);border-radius:50%;pointer-events:none;transform:translate(-50%,-50%);z-index:99999;";
      document.body.appendChild(dot);
    }
    return dot;
  }

  function connectGazePoint() {
    return new Promise((resolve, reject) => {
      ws = new WebSocket(WS_URL);

      ws.onopen = () => {
        connected = true;
        console.log("[GP] WebSocket connected");
        resolve();
      };

      ws.onerror = (e) => {
        console.error("[GP] WebSocket error", e);
        reject(e);
      };

      ws.onclose = () => {
        connected = false;
        console.log("[GP] WebSocket closed");
      };

      ws.onmessage = (event) => {
        const msg = JSON.parse(event.data);
        if (msg.type === "init") {
          SENTENCES_FIRST  = msg.sentences_first;
          SENTENCES_SECOND = msg.sentences_second;
          catchTrials = msg.catch_trials;
          catchTrialsReceived = true;
          console.log("Init received:", SENTENCES_FIRST.length, "pairs,", Object.keys(catchTrials).length, "catch trials");
          if (onCatchTrialsReceived) onCatchTrialsReceived();
        }
        if (msg.type === "gaze" && msg.data) {
          const d = msg.data;
          const sample = {
            fpogx: parseFloat(d.FPOGX),
            fpogy: parseFloat(d.FPOGY),
            fpogd: parseFloat(d.FPOGD || 0),
            fpogv: parseInt(d.FPOGV || 0),
            fpogid: parseInt(d.FPOGID || 0),
            bpogx: parseFloat(d.BPOGX || d.FPOGX),
            bpogy: parseFloat(d.BPOGY || d.FPOGY),
            bpogv: parseInt(d.BPOGV || 0),
            time: parseFloat(d.TIME || 0),
            user_data: d.USER_DATA || "",
            local_ts: performance.now()
          };
          gazeLog.push(sample);

          if (SHOW_GAZE_DOT && showGazeDot) {
            const dot = ensureGazeDot();
            if (sample.fpogv) {
              dot.style.display = "block";
              dot.style.left = (sample.fpogx * window.innerWidth) + "px";
              dot.style.top  = (sample.fpogy * window.innerHeight) + "px";
            } else {
              dot.style.display = "none";
            }
          }
        }
      };
    });
  }

  function sendTrigger(label) {
    if (ws && connected) {
      ws.send(JSON.stringify({ cmd: "trigger", value: label }));
      console.log("[TRIGGER]", label);
    }
  }

  function startCalibration() {
    if (ws && connected) {
      ws.send(JSON.stringify({ cmd: "calibrate" }));
    }
  }

  function stopExperiment() {
    if (ws && connected) {
      ws.send(JSON.stringify({ cmd: "stop" }));
      ws.close();
    }
  }

  function makeRecalibrationNode(sentidx) {
  return [
    {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: `
        <div class="instructions">
          <h2>Pause — Recalibration</h2>
          <p>Nous allons recalibrer le suivi oculaire.</p>
          <p>Appuyez sur <strong>ESPACE</strong> pour lancer la recalibration.</p>
        </div>
      `,
      choices: [" "],
      on_start: () => sendTrigger(`recalibration_prompt_${sentidx}`)
    },
    {
      type: jsPsychCallFunction,
      async: true,
      func: function(done) {
        const originalOnMessage = ws.onmessage;

        ws.onmessage = (event) => {
          const msg = JSON.parse(event.data);
          if (msg.type === "calibration_done" || msg.type === "calibration_result") {
            console.log("[RECALIB] Done at sentence", sentidx);
            ws.onmessage = originalOnMessage;
            done();
          } else {
            if (typeof originalOnMessage === "function") originalOnMessage(event);
          }
        };

        startCalibration();
        sendTrigger(`recalibration_start_${sentidx}`);
      }
    },
    {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: `
        <div class="instructions">
          <h2>Recalibration terminée</h2>
          <p>Appuyez sur <strong>ESPACE</strong> pour continuer la lecture.</p>
        </div>
      `,
      choices: [" "]
    }
  ];
}

  // ═══════════════════════════════════════════════════════════════
  //  jsPsych EXPERIMENT
  // ═══════════════════════════════════════════════════════════════

  const jsPsych = initJsPsych({
  on_finish: function () {
    const allData = jsPsych.data.get();

    if (typeof jatos !== "undefined") {
      jatos.submitResultData(JSON.stringify({
        jspsych: allData.json(),
        gaze: gazeLog
      }), jatos.startNextComponent);
    }
  }
  });

  const timeline = [];

  // ── 0. Consent Form ───────────────────────────────────────────

  //             &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
  //             <button type="button" class="btn btn-danger btn-lg" onclick="window.location='http://www.prolific.ac'">Non merci, je ne souhaite pas participer</button>

  //     document.getElementById('continue_btn').addEventListener('click', () => {
  //       display.innerHTML = '';
  //       done();
  //     });
  //   }
  // });
  
  // ── 1. Connect to relay ────────────────────────────────────────

  timeline.push({
    type: jsPsychHtmlKeyboardResponse,
    stimulus: `
      <div class="instructions">
        <h2>Expérience de lecture avec suivi eye-tracker</h2>
        <p>Cette expérience enregistre les mouvements de vos yeux pendant que vous lisez des phrases.</p>
        <p><strong>Avant de commencer :</strong> Asseyez-vous confortablement à environ 60 cm de l'écran</p>
        <p>Cliquez sur la touche <strong>ESPACE</strong> pour continuer.</p>
      </div>
    `,
    choices: [" "],
    on_finish: () => {}
  });

  timeline.push({
    type: jsPsychCallFunction,
    async: true,
    func: async function (done) {
      try {
        await connectGazePoint();
        done({ success: true });
      } catch (e) {
        done({ success: false, error: e.message });
      }
    }
  });

// ── 2. Calibration ────────────────────────────────────────────

    timeline.push({
    type: jsPsychHtmlKeyboardResponse,
    stimulus: `
      <div class="instructions">
        <h2>Calibration</h2>
        <p>Un écran de calibration apparaîtra dans la fenêtre.</p>
        <p>Suivez le point en mouvement avec vos yeux (sans bouger la tête) et sans prédire où il va.</p>
        <p>Si la calibration échoue, une deuxième tentative sera effectuée.</p>
        <p>Si celle ci échoue également, l'expérience sera interrompue.</p>
        <p>Appelez alors l'administrateur.</p>
        <p>Appuyez sur la touche <strong>ESPACE</strong> pour lancer la calibration et attendez 2 secondes.</p>
      </div>
    `,
    choices: [" "]
  });

  timeline.push({
    type: jsPsychCallFunction,
    async: true,
    func: function(done) {
      const originalOnMessage = ws.onmessage;
      
      ws.onmessage = (event) => {
        const msg = JSON.parse(event.data);
        
        if (msg.type === "calibration_done" || msg.type === "calibration_result") {
          console.log("[CALIB] Complete structure received:", msg.data);
          ws.onmessage = originalOnMessage; 
          done();
        } else {
          if (typeof originalOnMessage === "function") {
            originalOnMessage(event);
          }
        }
      };

      console.log("[CALIB] Launching calibration routine...");
      startCalibration();
      sendTrigger("calibration_start");
    }
  });

  // ── 3. Gaze check ─────────────────────────────────────────────

  timeline.push({
    type: jsPsychHtmlKeyboardResponse,
    stimulus: `
      <div class="instructions">
        <h2>L'expérience va commencer</h2>
        <p>Appuyez sur la touche <strong>ESPACE</strong> lorsque vous êtes prêt(e) à commencer.</p>
      </div>
    `,
    choices: [" "],
    on_start: () => {
      showGazeDot = true;
    }
  });

  // Wait for catch_trials from server (5 s timeout)
  timeline.push({
    type: jsPsychCallFunction,
    async: true,
    func: function(done) {
      if (catchTrialsReceived) {
        done();
      } else {
        const timeout = setTimeout(() => {
          onCatchTrialsReceived = null;
          done();
        }, 5000);
        onCatchTrialsReceived = () => {
          clearTimeout(timeout);
          done();
        };
      }
    }
  });

  // ── 4. Sentence reading trials ────────────────────────────────

  // presentationIdx = position in the randomized run (0, 1, 2 …)
  function makeSentenceTrials(sentenceFirst, sentenceSecond, presentationIdx) {
    const trialId = `pres${presentationIdx}`;
    return [
      {
        type: jsPsychHtmlKeyboardResponse,
        stimulus: '<div style="font-size:80px;text-align:center;">+</div>',
        choices: "NO_KEYS",
        trial_duration: 1000,
        on_start: () => sendTrigger(`fixation_onset_${trialId}`)
      },
      {
        type: jsPsychHtmlKeyboardResponse,
        stimulus: `
          <div class="sentence-container">
            <div class="sentence-text">${sentenceFirst}</div>
            <hr class="sentence-divider">
            <div class="sentence-text">${sentenceSecond}</div>
          </div>
        `,
        choices: [" "],
        data: {
          task: "reading",
          sentence_first: sentenceFirst,
          sentence_second: sentenceSecond,
          presentation_index: presentationIdx
        },
        on_start: () => sendTrigger(`sentence_onset_${trialId}`),
        on_finish: (data) => {
          sendTrigger(`sentence_offset_${trialId}`);
          data.rt_ms = data.rt;
        }
      }
    ];
  }

  function makeCatchTrialNode(sentence, sentidx, catchidx, type) {
    const question = `Avez-vous vu la phrase suivante ?<br><br><em>${sentence}</em>`;
    return {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: `
        <div style="
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          width: 90vw;
          max-width: 90vw;
          box-sizing: border-box;
          padding: 40px;
          word-wrap: break-word;
          overflow-wrap: break-word;
          white-space: normal;
        ">
          <div style="
            font-family: 'Courier New', monospace;
            font-size: 40px;
            line-height: 2.2;
            letter-spacing: 2px;
            text-align: center;
            color: #111;
            width: 100%;
            word-wrap: break-word;
            overflow-wrap: break-word;
            white-space: normal;
          ">${question}</div>

          <div style="
            display: flex;
            flex-direction: row;
            gap: 80px;
            margin-top: 60px;
            font-family: 'Courier New', monospace;
            font-size: 28px;
            color: #333;
          ">
            <div style="text-align:center;">
              <div style="font-size: 48px;">↑</div>
              <div>Oui</div>
            </div>
            <div style="text-align:center;">
              <div style="font-size: 48px;">↓</div>
              <div>Non</div>
            </div>
          </div>
        </div>
      `,
      choices: ["ArrowUp", "ArrowDown"],
      data: { task: "catch", sentence: sentence, catch_index: catchidx, sentence_position: sentidx, catch_type: type },
      on_start: () => sendTrigger(`catch_onset_${catchidx}`),
      on_finish: (data) => {
        sendTrigger(`catch_offset_${catchidx}`);
        data.response_label = data.response === "ArrowUp" ? "Oui" : "Non";
        data.correct_response = type === "seen" ? "Oui" : "Non";
        data.correct = (data.response === "ArrowUp") === (type === "seen");
      }
    };
  }

  // ── 5. Build trials using the randomized order ────────────────

  timeline.push({
    type: jsPsychCallFunction,
    func: function() {
      const subTimeline = [];
      let catchIdx = 0;

      for (let i = 0; i < SENTENCES_FIRST.length; i++) {

        // Recalibrate every 20 sentences (not at the very start)
        if (i > 0 && i % 20 === 0) {
          subTimeline.push(...makeRecalibrationNode(i));
        }

        // Catch trials keyed by position in the shuffled order (matches Python)
        if (catchTrials[String(i)]) {
          const ct = catchTrials[String(i)];
          subTimeline.push(makeCatchTrialNode(ct.sentence, i, catchIdx++, ct.type));
        }

        subTimeline.push(...makeSentenceTrials(
          SENTENCES_FIRST[i],
          SENTENCES_SECOND[i],
          i
        ));
      }

      subTimeline.push({
        type: jsPsychHtmlKeyboardResponse,
        stimulus: `
          <div class="instructions">
            <h2>L'expérience est terminée!</h2>
            <p>Merci pour votre participation!</p>
          </div>
        `,
        choices: [" "],
        on_start: () => {
          sendTrigger("experiment_end");
          showGazeDot = false;
          const dot = document.getElementById("gaze-dot");
          if (dot) dot.style.display = "none";
        },
        on_finish: () => {
          const allData = jsPsych.data.get();
          const catchData = allData.filter(trial => trial.task === "catch");

          ws.send(JSON.stringify({ cmd: "save_data", data_type: "experiment_csv", content: allData.csv() }));
          ws.send(JSON.stringify({ cmd: "save_data", data_type: "catch_trials_csv", content: catchData.csv() }));
          ws.send(JSON.stringify({ cmd: "save_data", data_type: "gaze_json", content: JSON.stringify(gazeLog, null, 2) }));
          // Also save the order used so results can be decoded later
          // ws.send(JSON.stringify({ cmd: "save_data", data_type: "sentence_order_json", content: JSON.stringify(SENTENCE_ORDER) }));

          setTimeout(() => stopExperiment(), 500);
        }
      });

      jsPsych.addNodeToEndOfTimeline({ timeline: subTimeline });
    }
  });

  // ── Run ────────────────────────────────────────────────────────
  jsPsych.run(timeline);

  </script>
</body>
